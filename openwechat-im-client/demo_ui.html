<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>OpenWechat Demo UI</title>
  <style>
    * { box-sizing: border-box; }
    body { font-family: system-ui, sans-serif; margin: 12px; background: #fff; font-size: 13px; }
    .head { display: flex; align-items: center; gap: 12px; flex-wrap: wrap; margin-bottom: 8px; }
    .head h1 { margin: 0; font-size: 1.1rem; font-weight: 600; }
    .muted { color: #888; font-size: 12px; }
    .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 8px; }
    @media (max-width: 600px) { .grid { grid-template-columns: 1fr; } }
    .card { background: #fafafa; border: 1px solid #eee; border-radius: 4px; padding: 8px; }
    .card h3 { margin: 0 0 6px 0; font-size: 12px; font-weight: 600; color: #555; }
    pre { white-space: pre-wrap; word-break: break-word; background: #fff; padding: 6px; border-radius: 2px; max-height: 200px; overflow: auto; font-size: 11px; margin: 0; border: 1px solid #eee; }
    .json-key { color: #055; }
    .json-str { color: #a50; }
    .json-num { color: #05a; }
    .foot { margin-top: 8px; font-size: 11px; color: #999; }
    .lang-switch a { margin-right: 8px; color: #888; text-decoration: none; font-size: 12px; }
    .lang-switch a:hover { color: #333; }
    .lang-switch a.active { font-weight: 600; color: #1976d2; }
  </style>
</head>
<body>
  <div class="head">
    <h1>OpenWechat</h1>
    <span class="lang-switch">
      <a href="#" data-lang="zh">中文</a>
      <a href="#" data-lang="en">En</a>
    </span>
    <span class="muted" data-i18n="subtitle">· 3s 刷新 · .data/</span>
  </div>

  <div id="files-grid" class="grid"></div>

  <div class="foot">
    <span data-i18n="lastRefresh">最后刷新</span>: <span id="last-refresh">-</span>
    <span style="margin-left: 12px;" data-i18n="customizeHint">· 可自由定制</span>
  </div>

  <script>
    const DATA_BASE = '.data';
    const MAX_CHARS = 8000;

    // 默认展示 .data 下的已知文件，按扩展名格式化
    const DATA_FILES = [
      'config.json',
      'profile.json',
      'contacts.json',
      'stats.json',
      'context_snapshot.json',
      'inbox_pushed.md',
      'conversations.md',
      'sse_channel.log'
    ];

    const i18n = {
      zh: {
        subtitle: '· 3s 刷新 · .data/',
        lastRefresh: '最后刷新',
        customizeHint: '· 可自由定制',
        loading: '(加载中...)',
        fileNotFound: '(文件未找到)',
        fetchError: '(请求失败)'
      },
      en: {
        subtitle: '· 3s refresh · .data/',
        lastRefresh: 'Last refresh',
        customizeHint: '· Freely customizable',
        loading: '(loading...)',
        fileNotFound: '(file not found)',
        fetchError: '(fetch error)'
      }
    };

    let lang = localStorage.getItem('demo_ui_lang') || 'zh';
    function t(key) { return i18n[lang]?.[key] ?? i18n.zh[key] ?? key; }

    function applyI18n() {
      document.documentElement.lang = lang === 'zh' ? 'zh-CN' : 'en';
      document.querySelectorAll('[data-i18n]').forEach(el => {
        const key = el.getAttribute('data-i18n');
        if (el.hasAttribute('data-i18n-placeholder')) return;
        el.textContent = t(key);
      });
      document.querySelectorAll('.lang-switch a').forEach(a => {
        a.classList.toggle('active', a.getAttribute('data-lang') === lang);
      });
    }

    function esc(s) {
      const div = document.createElement('div');
      div.textContent = s;
      return div.innerHTML;
    }

    function formatByExt(filename, raw) {
      const ext = filename.split('.').pop()?.toLowerCase();
      if (ext === 'json') {
        try {
          const obj = typeof raw === 'string' ? JSON.parse(raw) : raw;
          return JSON.stringify(obj, null, 2);
        } catch {
          return raw;
        }
      }
      return raw;
    }

    async function fetchFile(path) {
      try {
        const r = await fetch(`${DATA_BASE}/${path}`);
        if (!r.ok) return { ok: false, err: 'fileNotFound' };
        const ext = path.split('.').pop()?.toLowerCase();
        if (ext === 'json') {
          const json = await r.json();
          return { ok: true, data: json, ext };
        }
        let text = await r.text();
        if (text.length > MAX_CHARS) text = text.slice(-MAX_CHARS);
        return { ok: true, data: text, ext };
      } catch {
        return { ok: false, err: 'fetchError' };
      }
    }

    function renderContent(container, filename, result) {
      const card = document.createElement('div');
      card.className = 'card';
      const h3 = document.createElement('h3');
      h3.textContent = filename;
      card.appendChild(h3);
      const pre = document.createElement('pre');
      if (!result.ok) {
        pre.textContent = t(result.err);
      } else {
        const formatted = result.ext === 'json'
          ? JSON.stringify(result.data, null, 2)
          : result.data;
        pre.textContent = formatted;
      }
      card.appendChild(pre);
      container.appendChild(card);
    }

    function render() {
      const grid = document.getElementById('files-grid');
      grid.innerHTML = '';
      Promise.all(DATA_FILES.map(f => fetchFile(f))).then(results => {
        DATA_FILES.forEach((filename, i) => {
          renderContent(grid, filename, results[i]);
        });
        document.getElementById('last-refresh').textContent = new Date().toLocaleTimeString(lang === 'zh' ? 'zh-CN' : 'en-US');
      });
    }

    document.querySelectorAll('.lang-switch a').forEach(a => {
      a.addEventListener('click', (e) => {
        e.preventDefault();
        lang = a.getAttribute('data-lang');
        localStorage.setItem('demo_ui_lang', lang);
        applyI18n();
        render();
      });
    });

    applyI18n();
    render();
    setInterval(render, 3000);
  </script>
</body>
</html>
