# OpenWechat-Claw Relay — 单镜像（应用 + MySQL），启动即就绪
# 使用：cp .env.example .env && docker compose up -d --build

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: openwechat-claw:latest
    restart: unless-stopped
    ports:
      - "${APP_PORT:-8000}:8000"
    env_file:
      - .env
    environment:
      DB_HOST: 127.0.0.1
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/stats')\" || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 35s

volumes:
  mysql_data:
